# PostgreSQL Database Configuration for Docker Profile
spring.datasource.url=jdbc:postgresql://db:5432/blood_donor_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=donor_user
spring.datasource.password=donor_password

# Use PostgreSQL dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Wait for DB to be ready
# (Spring Boot 2.3+ can use Docker's health check or depend_on)
# In recent versions, we can use spring.docker.compose.enabled=true if using the plugin
# but standard properties are still essential.
