# Database Connection for Render
# Note: Render provides DATABASE_URL in postgres:// protocol, 
# but Spring Boot needs jdbc:postgresql://. It is much more reliable to use 
# the individual environment variables provided by Render (Host, Port, Name).
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# JWT Configuration (REQUIRED)
# If you haven't set JWT_SECRET in Render Environment Variables, it will use the default below.
# (Recommended: Set JWT_SECRET in Render Dashboard for security)
app.jwtSecret=${JWT_SECRET:mySuperSecretKeyThatIsLongEnoughForHS512AlgorithmAndShouldBeAtLeast512BitsLong123456789}
app.jwtExpirationInMs=86400000

# Server Settings
# Render automatically sets the PORT environment variable.
server.port=${PORT:8080}