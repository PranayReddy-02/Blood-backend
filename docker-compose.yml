version: '3.8'

services:
  # PostgreSQL Database service
  db:
    image: postgres:16-alpine
    container_name: blood-donor-db
    restart: always
    environment:
      - POSTGRES_USER=donor_user
      - POSTGRES_PASSWORD=donor_password
      - POSTGRES_DB=blood_donor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blood-donor-network

  # The backend Spring Boot service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blood-donor-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # Use locally-defined Spring profile
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/blood_donor_db
      - SPRING_DATASOURCE_USERNAME=donor_user
      - SPRING_DATASOURCE_PASSWORD=donor_password
      - JAVA_OPTS="-Xms256m -Xmx512m"
      # For local Docker Compose, set PORT to 8080 if not defined
      - PORT=8080
    networks:
      - blood-donor-network

volumes:
  postgres_data:

networks:
  blood-donor-network:
    driver: bridge
